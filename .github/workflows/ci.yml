name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build -o hpphub ./cmd/hpphub/

      - name: Version check
        run: ./hpphub --version

      - name: Help check
        run: ./hpphub --help

      - name: Login help
        run: ./hpphub login --help

      - name: Launch help
        run: ./hpphub launch --help

      - name: Models help
        run: ./hpphub models --help
